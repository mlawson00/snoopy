services:
  codex_workbench:
    build:
      context: .
      dockerfile: infra/codex/Dockerfile
      args:
        USER_UID: ${HOST_UID:-1000}
        USER_GID: ${HOST_GID:-1000}
    image: snoopy_codex_workbench
    working_dir: /workspace
    stdin_open: true
    tty: true
    gpus: all
    environment:
      HOME: /home/codex
      CODEX_HOME: /home/codex/.codex
      XDG_CACHE_HOME: /home/codex/.cache
      UV_CACHE_DIR: /home/codex/.cache/uv
      npm_config_cache: /home/codex/.cache/npm
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMMA_OPENAI_BASE_URL: ${GEMMA_OPENAI_BASE_URL:-http://gemma31b-llamacpp:8080/v1}
      GEMMA_OPENAI_API_KEY: ${LLAMACPP_GEMMA31B_API_KEY:-local-llama}
      GEMMA_MODEL: ${LLAMACPP_GEMMA31B_MODEL_FILE:-gemma-4-31B-it-UD-Q4_K_XL.gguf}
      PYTHONUNBUFFERED: "1"
    ports:
      - "127.0.0.1:${OMNIFOCUS_NOVNC_PORT:-6080}:6080"
      - "127.0.0.1:${OMNIFOCUS_DEBUG_PORT:-9222}:9222"
      - "127.0.0.1:${SNOOPY_WEB_PORT:-3100}:3100"
    volumes:
      - .:/workspace
      - codex_home:/home/codex/.codex
      - codex_cache:/home/codex/.cache

  gemma31b-llamacpp:
    build:
      context: ${LLAMACPP_GEMMA31B_BUILD_CONTEXT:-/home/mike/Desktop/llama-cpp-turboquant}
      dockerfile: deploy/server-cuda-only.Dockerfile
    image: local/llama.cpp-turboquant:server-cuda
    container_name: ${LLAMACPP_GEMMA31B_CONTAINER_NAME:-gemma31b-llamacpp}
    restart: unless-stopped
    ports:
      - "${LLAMACPP_GEMMA31B_HOST_PORT:-8006}:8080"
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - "${LLAMACPP_GEMMA31B_MODEL_DIR:-/home/mike/Desktop/llama-cpp-models/gemma-4-31B-it-GGUF}:/models:ro"
    command:
      - -m
      - /models/${LLAMACPP_GEMMA31B_MODEL_FILE:-gemma-4-31B-it-UD-Q4_K_XL.gguf}
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --ctx-size
      - "${LLAMACPP_GEMMA31B_CTX_SIZE:-655360}"
      - --parallel
      - "${LLAMACPP_GEMMA31B_PARALLEL:-3}"
      - --n-gpu-layers
      - "${LLAMACPP_GEMMA31B_GPU_LAYERS:-all}"
      - --cache-type-k
      - "${LLAMACPP_GEMMA31B_CACHE_TYPE_K:-turbo3}"
      - --cache-type-v
      - "${LLAMACPP_GEMMA31B_CACHE_TYPE_V:-turbo3}"
      - --batch-size
      - "${LLAMACPP_GEMMA31B_BATCH_SIZE:-4096}"
      - --ubatch-size
      - "${LLAMACPP_GEMMA31B_UBATCH_SIZE:-1024}"
      - --threads
      - "${LLAMACPP_GEMMA31B_THREADS:-8}"
      - --threads-batch
      - "${LLAMACPP_GEMMA31B_THREADS_BATCH:-8}"
      - --api-key
      - "${LLAMACPP_GEMMA31B_API_KEY:-local-llama}"
      - --temp
      - "${LLAMACPP_GEMMA31B_TEMP:-1.0}"
      - --top-p
      - "${LLAMACPP_GEMMA31B_TOP_P:-0.95}"
      - --top-k
      - "${LLAMACPP_GEMMA31B_TOP_K:-64}"
      - --jinja
      - --chat-template-kwargs
      - '{"enable_thinking":false}'
      - --ctx-checkpoints
      - "${LLAMACPP_GEMMA31B_CTX_CHECKPOINTS:-64}"
      - --checkpoint-every-n-tokens
      - "${LLAMACPP_GEMMA31B_CHECKPOINT_EVERY_N_TOKENS:-8192}"
      - --cache-ram
      - "${LLAMACPP_GEMMA31B_CACHE_RAM_MIB:-16384}"
      - --no-context-shift
      - --metrics
      - --slots
      - --log-timestamps
      - --log-prefix
      - --verbosity
      - "${LLAMACPP_GEMMA31B_VERBOSITY:-3}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  codex_home:
  codex_cache:
